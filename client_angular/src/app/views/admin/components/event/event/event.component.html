<div>
  <h3> <strong><em> Event Form </em> </strong></h3>

  <form cForm [formGroup]="eventForm" (ngSubmit)="onSubmit()">
    <input cFormControl id="inputId-1" type="hidden" sizing="sm" name="id" formControlName="id">

    <div class="mb-3">
      <label cLabel for="txtEventCode">Event Code: </label>
      <input cFormControl id="txtEventCode" type="text" sizing="sm" name="event_no" formControlName="event_no" readonly>
      <div cFormText>
        ex: EVN00001
      </div>
    </div>

    <hr class="mt-3">
    <div class="mb-3">
      <label cLabel for="txtEventName">Event Name: </label>
      <input cFormControl id="txtEventName" type="text" sizing="sm" name="name" formControlName="name">
      <div cFormText>
        ex: Xmas Party
      </div>
    </div>


    <div  class="mb-3">
      <input cButton color="primary" type="submit" [disabled]="eventForm.invalid || isEditMode ">&ngsp;
      <input cButton color="danger" style="color: white" type="button" (click)="clearForm()" value="Clear">&ngsp;
      <input cButton id="btnUpdate" [disabled]="!isEditMode" color="secondary" style="color: white" type="button"  value="Update" (click)="updateEvent()" >
    </div>
  </form>

</div>
<div>

  <h3>
    <strong>
      <em>
        Event view Table
      </em>
    </strong>

  </h3>
  <table [striped]="true" cTable>
    <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Event Number</th>
      <th scope="col">Event Name</th>
      <th scope="col">Action</th>
    </tr>
    </thead>
    <tbody>
    @for (event of events;track event ; let key = $index) {

    <tr>

      <th scope="row">{{key + 1}}</th>
      <td>{{ event.event_no }}</td>
      <td>{{ event.name }}</td>
      <td>
       <button (click)="getEventById(event.id)" cButton><svg cIcon name="cil-task" size="lg" title="Numbered List Icon"></svg></button>&ngsp;&ngsp;
    <button type="button" (click)="deleteEvent(event.id)" cButton color="danger"><svg cIcon name="cil-trash" size="lg" title="Numbered List Icon"></svg></button>    </td>
     </tr>
    }
    </tbody>
  </table>


</div>
