<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header>
        <strong>Monthly Booking Report</strong>
      </c-card-header>
      <c-card-body>
        <div style="height: 400px;">
          <c-chart type="line" [data]="chartData" [options]="chartOptions"></c-chart>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
